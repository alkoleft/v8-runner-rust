name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  BIN_NAME: v8-runner
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: v8-runner-linux-x86_64-musl
            bin_suffix: ""
            archive_ext: tar.gz
            linux_deps: musl-tools
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: v8-runner-windows-x86_64
            bin_suffix: ".exe"
            archive_ext: zip
            linux_deps: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: v8-runner-macos-x86_64
            bin_suffix: ""
            archive_ext: tar.gz
            linux_deps: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: v8-runner-macos-aarch64
            bin_suffix: ""
            archive_ext: tar.gz
            linux_deps: ""

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: ${{ matrix.linux_deps != '' }}
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.linux_deps }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package portable artifact
        shell: bash
        run: |
          set -euo pipefail

          package_dir="dist/${{ matrix.artifact_name }}"
          binary_path="target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.bin_suffix }}"
          archive_name="${{ matrix.artifact_name }}.${{ matrix.archive_ext }}"

          mkdir -p "${package_dir}"
          cp "${binary_path}" "${package_dir}/"
          cp README.md "${package_dir}/"
          cp -R examples "${package_dir}/examples"

          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "${package_dir}/${BIN_NAME}"
          fi

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (cd dist && 7z a "${archive_name}" "${{ matrix.artifact_name }}")
          else
            (cd dist && tar -czf "${archive_name}" "${{ matrix.artifact_name }}")
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive_name}" > "${archive_name}.sha256")
          else
            (cd dist && shasum -a 256 "${archive_name}" > "${archive_name}.sha256")
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            dist/*
