# Fixture-based live smoke config for scripts/test/live-cli-fixture.sh
# Copy this file, adjust the absolute paths, and export it as V8TR_DESIGNER_REAL_CONFIG.

workPath: /abs/path/to/repo/target/manual-tests/live-cli-fixture/work
format: DESIGNER
builder: DESIGNER
infobase:
  connection: "File=/abs/path/to/dedicated/file-infobase"

source-set:
  - name: configuration
    type: CONFIGURATION
    path: configuration
  - name: Расширение1
    type: EXTENSION
    path: extension
  - name: external-processor
    type: EXTERNAL_DATA_PROCESSORS
    path: external/processor
  - name: external-report
    type: EXTERNAL_REPORTS
    path: external/report

tools:
  platform:
    # May point to 1cv8 directly, to a bin dir, or to an installation root.
    path: /opt/1cv8/x86_64/8.3.27.1859/1cv8
